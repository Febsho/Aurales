name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled mpv
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          $tmp = Join-Path $env:RUNNER_TEMP 'mpv'
          $zip = Join-Path $env:RUNNER_TEMP 'mpv.zip'
          New-Item -ItemType Directory -Force $tmp | Out-Null
          Invoke-WebRequest -Uri 'https://github.com/mpv-player/mpv/releases/download/v0.41.0/mpv-v0.41.0-x86_64-pc-windows-msvc.zip' -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          Copy-Item (Join-Path $tmp 'mpv.exe') 'src-tauri/binaries/mpv-x86_64-pc-windows-msvc.exe' -Force

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Aurales v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      - name: Mirror updater assets to public release repo
        shell: pwsh
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPO_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
          PUBLIC_RELEASE_REPO: Febsho/Aurales-Releases
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_REPO_TOKEN)) {
            Write-Host 'Skipping public release mirror because RELEASE_REPO_TOKEN is not configured.'
            exit 0
          }

          $tag = $env:GITHUB_REF_NAME
          $releaseDir = Join-Path $env:RUNNER_TEMP 'public-release'
          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          $env:GH_TOKEN = $env:PRIVATE_REPO_TOKEN
          gh release download $tag --repo $env:GITHUB_REPOSITORY --dir $releaseDir --clobber

          $latestJson = Join-Path $releaseDir 'latest.json'
          $latest = Get-Content $latestJson -Raw
          $latest = $latest -replace 'github.com/Febsho/Aurales/releases/download', 'github.com/Febsho/Aurales-Releases/releases/download'
          Set-Content -Path $latestJson -Value $latest -NoNewline

          $env:GH_TOKEN = $env:RELEASE_REPO_TOKEN
          gh release view $tag --repo $env:PUBLIC_RELEASE_REPO *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --repo $env:PUBLIC_RELEASE_REPO --yes
          }

          $assets = Get-ChildItem $releaseDir -File | ForEach-Object { $_.FullName }
          gh release create $tag $assets --repo $env:PUBLIC_RELEASE_REPO --title "Aurales $tag" --notes 'Public updater release for Aurales.' --latest
