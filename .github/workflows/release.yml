name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            # Merge the Linux bundle configuration so the release includes the
            # .deb package consumed by the Flatpak build and Linux users.
            args: '--config src-tauri/tauri.linux.conf.json'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libx11-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled yt-dlp (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          # Linux relies on system mpv (deb/rpm dependency, PATH fallback in the app);
          # only yt-dlp is bundled as a sidecar.
          curl -fsSL -o src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
          chmod +x src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu
          ls -la src-tauri/binaries

      - name: Prepare bundled mpv and yt-dlp (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          $tmp = Join-Path $env:RUNNER_TEMP 'mpv'
          New-Item -ItemType Directory -Force $tmp | Out-Null

          # Fetch the latest shinchiro mpv-winbuild release (includes libmpv)
          $rel = Invoke-RestMethod -Uri 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest' -Headers @{ 'User-Agent' = 'aurales-ci' }

          # mpv-x86_64 archive: mpv.exe + d3dcompiler_43.dll
          $mpvAsset = $rel.assets | Where-Object { $_.name -match '^mpv-x86_64-\d' } | Select-Object -First 1
          $mpv7z = Join-Path $env:RUNNER_TEMP 'mpv.7z'
          Invoke-WebRequest -Uri $mpvAsset.browser_download_url -OutFile $mpv7z
          & 7z x $mpv7z -o"$tmp" -y | Out-Null
          Copy-Item (Join-Path $tmp 'mpv.exe') 'src-tauri/binaries/mpv-x86_64-pc-windows-msvc.exe' -Force
          foreach ($dll in @('d3dcompiler_43.dll')) {
            $src = Join-Path $tmp $dll
            if (Test-Path $src) { Copy-Item $src "src-tauri/binaries/$dll" -Force }
          }

          # mpv-dev-x86_64 archive: libmpv-2.dll
          $devAsset = $rel.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-\d' } | Select-Object -First 1
          $dev7z = Join-Path $env:RUNNER_TEMP 'mpv-dev.7z'
          Invoke-WebRequest -Uri $devAsset.browser_download_url -OutFile $dev7z
          & 7z x $dev7z -o"$tmp" -y libmpv-2.dll | Out-Null
          Copy-Item (Join-Path $tmp 'libmpv-2.dll') 'src-tauri/binaries/libmpv-2.dll' -Force

          # Fetch the latest yt-dlp binary
          Invoke-WebRequest -Uri 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe' -OutFile 'src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe' -UserAgent 'aurales-ci'

          Write-Host "Bundled binaries:"
          Get-ChildItem src-tauri/binaries | Format-Table Name,Length -AutoSize

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AURALES_UPDATE_TOKEN: ${{ secrets.AURALES_UPDATE_TOKEN }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TVDB_API_KEY: ${{ secrets.VITE_TVDB_API_KEY }}
          VITE_SIMKL_CLIENT_ID: ${{ secrets.VITE_SIMKL_CLIENT_ID }}
          VITE_TRAKT_CLIENT_ID: ${{ secrets.VITE_TRAKT_CLIENT_ID }}
          VITE_TRAKT_CLIENT_SECRET: ${{ secrets.VITE_TRAKT_CLIENT_SECRET }}
          VITE_ANILIST_CLIENT_ID: ${{ secrets.VITE_ANILIST_CLIENT_ID }}
          VITE_MDBLIST_CLIENT_ID: ${{ secrets.VITE_MDBLIST_CLIENT_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'Aurales v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Build Flatpak bundle
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//46 org.gnome.Sdk//46
          cp src-tauri/target/release/bundle/deb/*.deb packaging/flatpak/aurales.deb
          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-build packaging/flatpak/com.aurales.app.yml
          version="${GITHUB_REF_NAME#v}"
          flatpak build-bundle flatpak-repo "Aurales_${version}_amd64.flatpak" com.aurales.app
          ls -la *.flatpak

      - name: Upload Flatpak to release
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          file=$(ls Aurales_*_amd64.flatpak | head -n1)
          curl -sf -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$file" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${file}"
